name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: myuser
          POSTGRES_PASSWORD: mypassword
          POSTGRES_DB: webhookdb 
        options: >-
          --health-cmd "pg_isready -U myuser -d webhookdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker containers
        run: docker compose up -d --build

      - name: Wait for DB to be ready
        run: |
          until docker exec webhook-db pg_isready -U myuser -d webhookdb; do
            echo "Waiting for DB..."
            sleep 2
          done

      - name: Run tests in worker container
        run: docker exec webhook-worker npm test

      - name: Tear down containers
        run: docker compose down