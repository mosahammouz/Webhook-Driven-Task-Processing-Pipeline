version: "3.9"

services:
  # PostgreSQL database
  db:
    image: postgres:15
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: webhookdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - webhook-network

  # API server
  api:
    image: webhook-app      # single image
    container_name: webhook-api
    command: npm run start
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://myuser:mypassword@db:5432/webhookdb
    depends_on:
      - db
    networks:
      - webhook-network

  # Worker
  worker:
    image: webhook-app      # reuse same image
    container_name: webhook-worker
    command: npm run worker
    environment:
      DATABASE_URL: postgres://myuser:mypassword@db:5432/webhookdb
    depends_on:
      - db
    networks:
      - webhook-network

  # Fake subscriber (optional)
  subscriber:
    image: webhook-app      # reuse same image
    container_name: webhook-subscriber
    command: npx tsx fake-server.ts
    ports:
      - "5000:5000"
    networks:
      - webhook-network

# Named volume for DB persistence
volumes:
  db_data:

# Shared network
networks:
  webhook-network:
    driver: bridge