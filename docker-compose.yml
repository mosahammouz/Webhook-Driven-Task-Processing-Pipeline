version: "3.9"

services:
  db:
    image: postgres:15
    container_name: webhook-db
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: webhookdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - webhook-network

  api:
    image: webhook-app             # use prebuilt image
    container_name: webhook-api
    command: npm run start           # start script with nodemon recommended
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://myuser:mypassword@db:5432/webhookdb
    volumes:
      - .:/app                     # mount local code
      - /app/node_modules          # keep container node_modules separate
    depends_on:
      - db
    networks:
      - webhook-network

  worker:
    image: webhook-app             # reuse same image
    container_name: webhook-worker
    command: npm run worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://myuser:mypassword@db:5432/webhookdb
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db
    networks:
      - webhook-network

  subscriber:
    image: webhook-app             # reuse same image
    container_name: webhook-subscriber
    command: npx tsx fake-server.ts
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - webhook-network

volumes:
  db_data:

networks:
  webhook-network:
    driver: bridge